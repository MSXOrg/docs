[project.theme]
language = "en"
custom_dir = "overrides"
font.text = "Mona Sans"
font.code = "Source Code Pro"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.preview",
  "navigation.instant.progress",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
]

[project.theme.icon]
repo = "material/github"
link = "material/link-variant"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/link"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "light blue"
toggle.icon = "material/toggle-switch-off-outline"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "black"
accent = "light blue"
toggle.icon = "material/toggle-switch"
toggle.name = "Switch to system preference"

[project.plugins.meta]

[project.plugins.search]

[project.markdown_extensions.toc]
permalink = "#"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.abbr]

[project.markdown_extensions.admonition]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md", "includes/links.md"]

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/MSXOrg"
name = "MSX on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/MariusStorhaug"
name = "Marius Storhaug on GitHub"
